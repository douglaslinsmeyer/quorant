name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: latest
      - name: Check formatting
        working-directory: backend
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Run unit tests
        working-directory: backend
        run: go test ./... -short -count=1 -race

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: quorant
          POSTGRES_PASSWORD: quorant
          POSTGRES_DB: quorant_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      # NATS is started as a step (not a service) so we can pass the -js flag
      # to enable JetStream, which GitHub Actions service containers do not
      # support via custom entrypoint arguments.
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10-alpine -js -m 8222
          # Wait for NATS to be ready
          for i in $(seq 1 10); do
            if wget --no-verbose --tries=1 --spider http://localhost:8222/healthz 2>/dev/null; then
              echo "NATS is ready"
              break
            fi
            echo "Waiting for NATS... attempt $i"
            sleep 2
          done
      - name: Apply migrations
        working-directory: backend
        run: |
          for f in migrations/20260409000*.sql; do
            PGPASSWORD=quorant psql -h localhost -U quorant -d quorant_dev -f "$f"
          done
      - name: Run integration tests
        working-directory: backend
        run: go test ./... -count=1 -tags=integration -race
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: quorant
          DB_PASSWORD: quorant
          DB_NAME: quorant_dev
          NATS_URL: nats://localhost:4222

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Build API server
        working-directory: backend
        run: go build -o bin/quorant-api ./cmd/quorant-api
      - name: Build Worker
        working-directory: backend
        run: go build -o bin/quorant-worker ./cmd/quorant-worker

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        working-directory: backend
        run: govulncheck ./...
