run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  errcheck:
    exclude-functions:
      - (*database/sql.Rows).Close
      - (io.Closer).Close

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
